<!DOCTYPE html>

<html class="dark" lang="en"><head>

                    "secondary": "#ddb7ff",

                    "background": "#131313",
                    "surface-container-low": "#1c1b1b",
                    "on-secondary-container": "#d6a9ff",

                    "surface-dim": "#131313",
                    "on-primary": "#1000a9",
                    "on-surface": "#e5e2e1",
                    "error": "#ffb4ab",

            "fontFamily": {
                    "headline": ["Manrope"],
                    "body": ["Inter"],
                    "label": ["Inter"]

<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .glass-pane {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
        }
        .refractive-edge {
            box-shadow: inset 0 1px 0 0 rgba(192, 193, 255, 0.15);
        }
        .liquid-gradient {
            background: linear-gradient(135deg, #c0c1ff 0%, #8083ff 100%);
        }
        .obsidian-depth {
            background: radial-gradient(circle at 50% -20%, #201f1f 0%, #0e0e0e 100%);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>

<body class="bg-background text-on-surface font-body selection:bg-primary-container selection:text-white">
<!-- TopAppBar -->
<header class="fixed top-0 w-full z-50 bg-[#131313]/80 backdrop-blur-xl border-b border-[#353534]/20 shadow-[0_20px_40px_rgba(0,0,0,0.4)] flex justify-between items-center px-6 h-16">
<div class="flex items-center gap-3">
<div class="w-8 h-8 rounded-full bg-surface-container-highest flex items-center justify-center overflow-hidden ring-1 ring-white/10">
<img alt="User Profile" class="w-full h-full object-cover" data-alt="close-up minimalist portrait of a person with soft cinematic lighting against a dark textured background" src="https://lh3.googleusercontent.com/aida-public/AB6AXuBteGecZfKcMILa8GdsgqJv623IbcA_Voe8g0TsJCCRJDwUA6MEAKg4N4ZIYSzuo2tGQO4nd3QeypyNvqxD16J3dIqQuxReuBstnjAhL4D-AfERc725ze09TmAiXoTVf_m5FsuhsHEZ0pUUOv_A5oHURUKMl2-SGlKs2ubd10ABu506xYfiejriS8XO8fNcG-muJnz6aDn6_3Nw9LkEHHliMfp-zvCDjU0WEv2LV8xqc8gdIYv7tizQkSBm9J5wFxj1o7q6MW4r8nCy"/>
</div>
<h1 class="text-2xl font-black tracking-[-0.02em] text-[#C0C1FF] font-['Manrope'] uppercase">RONI</h1>
</div>
<button class="w-10 h-10 flex items-center justify-center rounded-xl hover:bg-[#353534]/40 transition-colors text-[#C0C1FF]">
<span class="material-symbols-outlined">settings</span>
</button>
</header>
<main class="min-h-screen pt-24 pb-32 px-6 obsidian-depth overflow-x-hidden">
<!-- Header Section -->
<section class="mb-12 text-center">
<span class="text-[10px] uppercase tracking-[0.2em] font-medium text-primary-fixed-dim/60 mb-2 block font-label">Neural Audio Canvas</span>
<h2 class="text-4xl font-headline font-extrabold tracking-tighter text-on-surface">Focus Sounds</h2>
</section>
<!-- Central Mixer Area -->
<div class="relative flex justify-center items-center py-12">
<!-- Light Leak Wave Effects -->
<div class="absolute inset-0 flex justify-center items-center opacity-20 pointer-events-none">
<div class="w-72 h-72 rounded-full border border-primary/20 animate-pulse"></div>
<div class="absolute w-[400px] h-[400px] rounded-full border border-primary/10"></div>
</div>
<!-- Main Refractive Disc -->
<div class="relative z-10 w-64 h-64 rounded-full glass-pane refractive-edge flex flex-col items-center justify-center shadow-[0_40px_80px_rgba(0,0,0,0.6)]">
<div class="absolute -top-4 -right-4">
<div class="liquid-gradient w-12 h-12 rounded-full flex items-center justify-center shadow-[0_0_20px_rgba(99,102,241,0.5)]">
<span class="material-symbols-outlined text-on-primary-container" style="font-variation-settings: 'FILL' 1;">play_arrow</span>
</div>
</div>
<span class="material-symbols-outlined text-primary text-5xl mb-2" style="font-variation-settings: 'FILL' 1;">graphic_eq</span>
<span class="text-primary-fixed font-headline font-bold text-lg">SPATIAL MIX</span>
<p class="text-[10px] text-on-surface-variant uppercase tracking-widest mt-1">48kHz High Fidelity</p>
</div>
<!-- Smaller Glass Nodes (Positioned Asymmetrically) -->
<div class="absolute top-0 left-4 z-20">
<div class="w-24 h-24 rounded-3xl glass-pane refractive-edge flex flex-col items-center justify-center p-3 text-center transition-transform hover:scale-110">
<span class="material-symbols-outlined text-secondary-fixed-dim text-2xl mb-1">water_drop</span>
<span class="text-[10px] font-bold text-on-surface">Obsidian Rain</span>
</div>
</div>
<div class="absolute bottom-4 right-2 z-20">
<div class="w-24 h-24 rounded-3xl glass-pane refractive-edge flex flex-col items-center justify-center p-3 text-center transition-transform hover:scale-110">
<span class="material-symbols-outlined text-primary-fixed-dim text-2xl mb-1">forest</span>
<span class="text-[10px] font-bold text-on-surface">Deep Forest</span>
</div>
</div>
<div class="absolute -bottom-8 left-12 z-20">
<div class="w-24 h-24 rounded-3xl glass-pane refractive-edge flex flex-col items-center justify-center p-3 text-center transition-transform hover:scale-110">
<span class="material-symbols-outlined text-secondary text-2xl mb-1">air</span>
<span class="text-[10px] font-bold text-on-surface">Solar Wind</span>
</div>
</div>
</div>
<!-- Mixer Sliders -->
<section class="mt-20 space-y-8">
<!-- Slider Item 1 -->
<div class="group">
<div class="flex justify-between items-center mb-3 px-1">
<label class="text-xs font-bold uppercase tracking-widest text-on-surface-variant flex items-center gap-2">
<span class="material-symbols-outlined text-sm">water_drop</span>
                        Obsidian Rain
                    </label>
<span class="text-xs font-mono text-primary">74%</span>
</div>
<div class="h-2 w-full bg-surface-container-highest rounded-full relative overflow-hidden ring-1 ring-white/5">
<div class="absolute top-0 left-0 h-full w-[74%] bg-[#6366F1] shadow-[0_0_15px_rgba(99,102,241,0.8)] rounded-full"></div>
</div>
</div>
<!-- Slider Item 2 -->
<div class="group">
<div class="flex justify-between items-center mb-3 px-1">
<label class="text-xs font-bold uppercase tracking-widest text-on-surface-variant flex items-center gap-2">
<span class="material-symbols-outlined text-sm">forest</span>
                        Deep Forest
                    </label>
<span class="text-xs font-mono text-primary">42%</span>
</div>
<div class="h-2 w-full bg-surface-container-highest rounded-full relative overflow-hidden ring-1 ring-white/5">
<div class="absolute top-0 left-0 h-full w-[42%] bg-[#6366F1] shadow-[0_0_15px_rgba(99,102,241,0.8)] rounded-full"></div>
</div>
</div>
<!-- Slider Item 3 -->
<div class="group">
<div class="flex justify-between items-center mb-3 px-1">
<label class="text-xs font-bold uppercase tracking-widest text-on-surface-variant flex items-center gap-2">
<span class="material-symbols-outlined text-sm">air</span>
                        Solar Wind
                    </label>
<span class="text-xs font-mono text-primary">28%</span>
</div>
<div class="h-2 w-full bg-surface-container-highest rounded-full relative overflow-hidden ring-1 ring-white/5">
<div class="absolute top-0 left-0 h-full w-[28%] bg-[#6366F1] shadow-[0_0_15px_rgba(99,102,241,0.8)] rounded-full"></div>
</div>
</div>
</section>
<!-- Master Toggle -->
<section class="mt-16 bg-surface-container-low rounded-[32px] p-6 flex items-center justify-between shadow-xl ring-1 ring-white/5">
<div>
<h3 class="text-sm font-bold uppercase tracking-widest text-primary-fixed-dim">Master Flow</h3>
<p class="text-xs text-on-surface-variant">Adaptive intelligence active</p>
</div>
<button class="relative w-14 h-8 bg-secondary-container rounded-full flex items-center px-1 shadow-[inset_0_2px_4px_rgba(0,0,0,0.5)] transition-all">
<div class="absolute inset-0 bg-secondary-container rounded-full animate-ping opacity-20"></div>
<div class="w-6 h-6 bg-white rounded-full shadow-lg translate-x-6"></div>
</button>
</section>
</main>
<!-- BottomNavBar -->
<nav class="fixed bottom-0 left-0 w-full z-50 flex justify-around items-center px-4 pb-6 pt-3 bg-[#0E0E0E]/90 backdrop-blur-2xl rounded-t-[32px] border-t border-white/10 shadow-[0_-10px_30px_rgba(0,0,0,0.5)]">
<div class="flex flex-col items-center justify-center bg-gradient-to-b from-[#6F00BE]/20 to-[#6366F1]/20 text-[#C0C1FF] rounded-2xl px-5 py-2 ring-1 ring-inset ring-white/10">
<span class="material-symbols-outlined text-2xl" style="font-variation-settings: 'FILL' 1;">timer</span>
<span class="font-['Inter'] text-[10px] uppercase tracking-[0.05em] font-medium mt-1">Focus</span>
</div>
<div class="flex flex-col items-center justify-center text-[#8083FF]/40 px-5 py-2 hover:text-[#C0C1FF] transition-all">
<span class="material-symbols-outlined text-2xl">format_list_bulleted</span>
<span class="font-['Inter'] text-[10px] uppercase tracking-[0.05em] font-medium mt-1">Tasks</span>
</div>
<div class="flex flex-col items-center justify-center text-[#8083FF]/40 px-5 py-2 hover:text-[#C0C1FF] transition-all">
<span class="material-symbols-outlined text-2xl">query_stats</span>
<span class="font-['Inter'] text-[10px] uppercase tracking-[0.05em] font-medium mt-1">Insights</span>
</div>
<div class="flex flex-col items-center justify-center text-[#8083FF]/40 px-5 py-2 hover:text-[#C0C1FF] transition-all">
<span class="material-symbols-outlined text-2xl">group</span>
<span class="font-['Inter'] text-[10px] uppercase tracking-[0.05em] font-medium mt-1">Community</span>
</div>
</nav>
</body></html>
