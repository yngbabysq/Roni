<body class="bg-surface-container-lowest text-on-surface font-body selection:bg-primary/30 min-h-screen overflow-hidden flex flex-col">
<!-- TopAppBar -->
<header class="bg-[#0E0E0E]/80 backdrop-blur-xl border-b border-white/5 shadow-[0_20px_40px_rgba(0,0,0,0.4)] fixed top-0 z-50 flex justify-between items-center px-6 py-4 w-full">

<div class="w-10 h-10 flex items-center justify-center rounded-xl bg-gradient-to-br from-primary-container to-secondary-container">

</div>
<h1 class="font-headline font-bold tracking-tight text-2xl text-[#6366F1]">Roni</h1>

<div class="flex items-center gap-4">
<button class="material-symbols-outlined text-zinc-500 hover:opacity-80 transition-opacity active:scale-95 duration-200">settings</button>
</div>
</header>
<!-- Main Canvas: Focus Mode -->
<main class="flex-grow flex flex-col items-center justify-center px-6 relative liquid-glass-bg">
<!-- Subtle Refraction Textures (Visual Layers) -->
<div class="absolute inset-0 overflow-hidden pointer-events-none">
<div class="absolute top-[10%] left-[-10%] w-[40%] h-[40%] bg-primary/5 blur-[120px] rounded-full"></div>
<div class="absolute bottom-[10%] right-[-10%] w-[30%] h-[30%] bg-secondary-container/10 blur-[100px] rounded-full"></div>
</div>
<!-- Central Focus Element -->
<div class="relative flex flex-col items-center justify-center z-10">
<!-- Progress Ring Visualization -->
<div class="relative flex items-center justify-center w-80 h-80 md:w-96 md:h-96">
<!-- Outer Glass Ring Background -->
<div class="absolute inset-0 rounded-full border-[1px] border-white/5 bg-white/2 backdrop-blur-sm"></div>
<!-- Liquid Progress Ring -->
<svg class="absolute inset-0 w-full h-full transform -rotate-90">
<circle class="text-primary/10" cx="50%" cy="50%" fill="transparent" r="48%" stroke="currentColor" stroke-width="4"></circle>
<circle class="text-[#6366F1] shadow-[0_0_15px_rgba(99,102,241,0.6)]" cx="50%" cy="50%" fill="transparent" r="48%" stroke="currentColor" stroke-dasharray="1000" stroke-dashoffset="300" stroke-linecap="round" stroke-width="6"></circle>
</svg>
<!-- Timer Text -->
<div class="flex flex-col items-center">
<span class="font-headline font-extrabold text-7xl md:text-8xl tracking-tight text-frosted-pearl">25:00</span>
<span class="font-label text-xs uppercase tracking-[0.2em] text-on-surface-variant mt-2 opacity-60">Deep Work</span>
</div>
</div>
<!-- Controls -->
<div class="flex items-center gap-6 mt-16">
<button class="group flex items-center gap-3 px-8 py-4 rounded-2xl bg-surface-container-low border-t border-white/10 shadow-2xl hover:scale-105 active:scale-95 transition-all duration-300">
<span class="material-symbols-outlined text-primary group-hover:fill-[1]">pause</span>
<span class="font-medium tracking-wide">Pause</span>
</button>
<button class="group flex items-center gap-3 px-8 py-4 rounded-2xl bg-surface-container-highest border-t border-white/10 shadow-2xl hover:scale-105 active:scale-95 transition-all duration-300">
<span class="material-symbols-outlined text-error group-hover:fill-[1]">stop</span>
<span class="font-medium tracking-wide text-on-surface">End</span>
</button>
</div>
<!-- Motivation Label -->
<div class="mt-12">
<p class="font-headline font-semibold text-lg text-[#C0C1FF] tracking-tight text-center">
                    Stay in the flow, Roni.
                </p>
<div class="mt-2 flex justify-center gap-1">
<div class="w-1 h-1 rounded-full bg-[#6366F1]"></div>
<div class="w-1 h-1 rounded-full bg-[#6366F1]/40"></div>
<div class="w-1 h-1 rounded-full bg-[#6366F1]/20"></div>
</div>
</div>
</div>
<!-- Task Mini-Card (Bottom Focus) -->
<div class="absolute bottom-32 w-full max-w-md px-6">
<div class="bg-surface-container-low/50 backdrop-blur-md p-4 rounded-2xl border-t border-white/5 flex items-center gap-4">
<div class="p-2 bg-secondary-container/20 rounded-lg">
<span class="material-symbols-outlined text-secondary" style="font-variation-settings: 'FILL' 1;">checklist</span>
</div>
<div>
<h4 class="text-sm font-semibold">Refining Brand Identity</h4>
<p class="text-xs text-on-surface-variant">Focusing on "Liquid Glass 2026" system</p>
</div>
</div>
</div>
