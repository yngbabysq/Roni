<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@200;400;700;800&amp;family=Inter:wght@400;500;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "on-tertiary-fixed-variant": "#41474e",
                    "secondary-container": "#6f00be",
                    "inverse-primary": "#494bd6",
                    "on-primary": "#1000a9",
                    "surface": "#131313",
                    "outline-variant": "#464554",
                    "on-tertiary": "#2b3137",
                    "on-surface-variant": "#c7c4d7",
                    "on-secondary-container": "#d6a9ff",
                    "surface-container-low": "#1c1b1b",
                    "primary-fixed": "#e1e0ff",
                    "surface-bright": "#3a3939",
                    "on-primary-fixed-variant": "#2f2ebe",
                    "surface-tint": "#c0c1ff",
                    "on-error": "#690005",
                    "on-tertiary-container": "#242a30",
                    "secondary-fixed": "#f0dbff",
                    "primary": "#c0c1ff",
                    "on-secondary": "#490080",
                    "primary-container": "#8083ff",
                    "error": "#ffb4ab",
                    "tertiary-fixed-dim": "#c1c7cf",
                    "on-primary-fixed": "#07006c",
                    "on-error-container": "#ffdad6",
                    "error-container": "#93000a",
                    "inverse-surface": "#e5e2e1",
                    "on-secondary-fixed": "#2c0051",
                    "on-background": "#e5e2e1",
                    "surface-container-lowest": "#0e0e0e",
                    "on-surface": "#e5e2e1",
                    "primary-fixed-dim": "#c0c1ff",
                    "tertiary": "#c1c7cf",
                    "on-primary-container": "#0d0096",
                    "inverse-on-surface": "#313030",
                    "on-secondary-fixed-variant": "#6900b3",
                    "surface-container-highest": "#353534",
                    "secondary-fixed-dim": "#ddb7ff",
                    "secondary": "#ddb7ff",
                    "on-tertiary-fixed": "#161c22",
                    "tertiary-fixed": "#dde3eb",
                    "surface-variant": "#353534",
                    "surface-dim": "#131313",
                    "tertiary-container": "#8b9199",
                    "surface-container-high": "#2a2a2a",
                    "surface-container": "#201f1f",
                    "outline": "#908fa0",
                    "background": "#131313"
            },
            "borderRadius": {
                    "DEFAULT": "0.25rem",
                    "lg": "0.5rem",
                    "xl": "0.75rem",
                    "full": "9999px"
            },
            "fontFamily": {
                    "headline": ["Manrope"],
                    "body": ["Inter"],
                    "label": ["Inter"]
            }
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .liquid-glass {
            background: linear-gradient(135deg, rgba(192, 193, 255, 0.1) 0%, rgba(128, 131, 255, 0.05) 100%);
            backdrop-filter: blur(40px);
            box-shadow: inset 0 0 0 1px rgba(192, 193, 255, 0.15), 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }
        .refractive-text {
            color: #c0c1ff;
            text-shadow: 
                0 0 10px rgba(99, 102, 241, 0.4),
                0 0 20px rgba(99, 102, 241, 0.2),
                2px 2px 4px rgba(0, 0, 0, 0.5);
            background: linear-gradient(to bottom, #e1e0ff 0%, #c0c1ff 50%, #8083ff 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .light-leak-border {
            border: 1px solid transparent;
            background: linear-gradient(#1c1b1b, #1c1b1b) padding-box,
                        linear-gradient(to right, transparent, rgba(192, 193, 255, 0.3), transparent) border-box;
        }
        .obsidian-void {
            background: radial-gradient(circle at center, #131313 0%, #0e0e0e 100%);
        }
        .particle {
            position: absolute;
            width: 3px;
            height: 3px;
            background: #c0c1ff;
            border-radius: 50%;
            opacity: 0.4;
            filter: blur(1px);
        }
    </style>
</head>
<body class="bg-background text-on-surface font-body overflow-hidden">
<div class="obsidian-void min-h-screen flex flex-col items-center justify-center relative">
<!-- Header Branding (Suppressed Nav for Focus Mode) -->
<header class="fixed top-0 left-0 w-full p-8 flex justify-between items-center z-50">
<div class="flex items-center gap-4">
<span class="font-headline font-black text-2xl tracking-tighter text-primary drop-shadow-[0_0_15px_rgba(99,102,241,0.5)]">Roni</span>
<span class="label-sm text-on-surface-variant tracking-[0.2em] uppercase text-[10px]">Productivity Mode</span>
</div>
<div class="flex items-center gap-6">
<div class="flex items-center gap-2 px-3 py-1 bg-surface-container-low rounded-full">
<span class="material-symbols-outlined text-primary text-sm" data-icon="auto_awesome">auto_awesome</span>
<span class="font-label text-xs font-medium text-primary-fixed-dim">Deep Work</span>
</div>
<button class="material-symbols-outlined text-on-surface-variant hover:text-primary transition-colors" data-icon="settings">settings</button>
</div>
</header>
<!-- Main Focus Canvas -->
<main class="flex flex-col items-center justify-center w-full max-w-4xl px-6 relative">
<!-- Floating Glass Orb Context -->
<div class="absolute -top-32 left-1/2 -translate-x-1/2 w-[600px] h-[600px] bg-primary/5 rounded-full blur-[120px] pointer-events-none"></div>
<!-- Large Minimalist Timer -->
<div class="relative group">
<!-- Liquid Glass Container -->
<div class="liquid-glass w-80 h-80 md:w-[480px] md:h-[480px] rounded-full flex items-center justify-center relative z-10 overflow-hidden border border-white/5">
<!-- Digital Refraction Effect -->
<div class="absolute inset-0 bg-gradient-to-tr from-transparent via-white/5 to-transparent pointer-events-none"></div>
<!-- Timer Numbers -->
<div class="flex flex-col items-center">
<span class="font-headline font-extrabold text-8xl md:text-[12rem] tracking-tight refractive-text leading-none">
                            25:00
                        </span>
<div class="mt-4 flex flex-col items-center gap-1">
<span class="font-label text-sm text-primary/60 tracking-[0.3em] uppercase">Remaining</span>
</div>
</div>
</div>
<!-- Particle Splash Effects -->
<div class="particle bottom-0 left-1/4" style="transform: translateY(20px);"></div>
<div class="particle bottom-4 left-1/3" style="transform: translateY(40px);"></div>
<div class="particle bottom-2 right-1/4" style="transform: translateY(30px);"></div>
<div class="particle -bottom-6 left-1/2" style="transform: translateY(10px);"></div>
<div class="particle bottom-8 right-1/3" style="transform: translateY(50px);"></div>
</div>
<!-- Focus Subtitle -->
<div class="mt-16 text-center space-y-4">
<h2 class="font-headline text-3xl md:text-5xl font-bold tracking-tight text-on-surface opacity-90">
                    Design System Refinement
                </h2>
<div class="flex items-center justify-center gap-3">
<span class="w-1.5 h-1.5 bg-primary rounded-full animate-pulse"></span>
<p class="font-body text-on-surface-variant text-lg">Current session in progress</p>
</div>
</div>
</main>
<!-- Footer Actions -->
<footer class="fixed bottom-0 left-0 w-full p-12 flex flex-col items-center gap-8">
<!-- Focus Tip -->
<div class="bg-surface-container-lowest/40 backdrop-blur-md px-6 py-3 rounded-full border border-white/5 flex items-center gap-3">
<span class="material-symbols-outlined text-secondary-fixed-dim text-sm" data-icon="lightbulb">lightbulb</span>
<span class="text-xs font-label text-on-surface-variant">Phones are muted. Notification filters active.</span>
</div>
<!-- End Session Button -->
<button class="light-leak-border px-10 py-4 rounded-xl text-primary font-headline font-bold text-sm tracking-widest uppercase hover:bg-surface-container-highest transition-all duration-300 transform hover:scale-[1.02] active:scale-[0.98]">
                End Session
            </button>
</footer>
<!-- Decorative "Glass Panes" in background -->
<div class="fixed top-20 -left-20 w-64 h-64 bg-primary/5 blur-[80px] rounded-full"></div>
<div class="fixed bottom-40 -right-20 w-96 h-96 bg-secondary-container/5 blur-[100px] rounded-full"></div>
<!-- Ambient Image Layers -->
<div class="fixed inset-0 pointer-events-none opacity-[0.03] mix-blend-overlay">
<img class="w-full h-full object-cover" data-alt="microscopic texture of polished black obsidian with faint crystalline structures and subtle light refractions deep shadows" src="https://lh3.googleusercontent.com/aida-public/AB6AXuAE6ZJiCECpJekby84lAoBQ8fl4IaYo88W_Ja1JIjPpTTB4eoiDwOjxW1idWMETXOUxhSSNvwOobshOwcjzu-stxXcDF03NbJmon-W08Iliyr04FFT7wU_AH2TyaQkdfbL0G3rPGU586ZPQbsof_lzhFpDEILOBXnt_BEhcQk3NUFw1PSRuJKF9RdzpCIE-s3P2KSsHJmIpWDEO_Fi2IqVI6wN1uHLh2LqfCejMDDdUNckE4oYXKmOBSrPfHMLLABVemXHS9c-KFpSa"/>
</div>
</div>
</body></html>
